[package]
name = "neo-native-contracts"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
repository.workspace = true
license.workspace = true
description = "Canonical home for Neo's native contracts (NEO, GAS, Policy, Oracle, Notary, StdLib, CryptoLib, etc.) and the shared NativeContract infrastructure"

[dependencies]
# Foundation / VM layer
neo-primitives = { workspace = true }
neo-error = { workspace = true }
neo-io = { workspace = true }
neo-crypto = { workspace = true }
neo-vm = { workspace = true }
neo-vm-rs = { workspace = true }
neo-config = { workspace = true }
neo-storage = { workspace = true }
neo-manifest = { workspace = true }
neo-serialization = { workspace = true }
neo-payloads = { workspace = true }
# The execution layer provides the ApplicationEngine that native contracts
# call into (and the abstract NativeContract trait they implement).
neo-execution = { workspace = true }

# External crates actually referenced by source (others are pulled in
# transitively via the foundation/VM layer above and don't need to be
# declared directly).
serde = { workspace = true }
hex = { workspace = true }
num-bigint = { workspace = true }
num-traits = { workspace = true }
