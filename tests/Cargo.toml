[package]
name = "neo-tests"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish = false
description = "Integration tests for neo-rs workspace layer boundaries and end-to-end testing"

# This is a workspace member used only for cross-crate verification. It is not
# linked into the running node or published as a crate.
# Run with: cargo test -p neo-tests

[dependencies]
# Foundation
neo-primitives = { workspace = true }

# Infrastructure
neo-io = { workspace = true }
neo-serialization = { workspace = true }
neo-storage = { workspace = true }
neo-config = { workspace = true }
neo-crypto = { workspace = true }

# Protocol
neo-consensus = { workspace = true }
neo-payloads = { workspace = true }

# Domain / node / RPC crates exercised by integration tests
neo-native-contracts = { workspace = true }
neo-blockchain = { workspace = true }
neo-network = { workspace = true }
neo-rpc = { workspace = true }

# Canonical VM implementation
neo-vm = { workspace = true }

# Utilities
num-bigint = { workspace = true }
hex = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "sync", "test-util", "time"] }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
serde_json = { workspace = true }
tempfile = { workspace = true }
toml = { workspace = true }

[dev-dependencies]
criterion = { workspace = true }

[[test]]
name = "layer_boundary_tests"
path = "tests/architecture/layer_boundary_tests.rs"

[[test]]
name = "consensus_integration_tests"
path = "tests/consensus/consensus_integration_tests.rs"

[[test]]
name = "state_integration_tests"
path = "tests/state/state_integration_tests.rs"

[[test]]
name = "end_to_end_tests"
path = "tests/system/end_to_end_tests.rs"

[[test]]
name = "chaos_tests"
path = "tests/system/chaos_tests.rs"

[[test]]
name = "e2e_transaction_flow"
path = "tests/transactions/e2e_transaction_flow.rs"

[[test]]
name = "block_persistence"
path = "tests/storage/block_persistence.rs"

[[test]]
name = "p2p_message_exchange"
path = "tests/network/p2p_message_exchange.rs"

[[test]]
name = "contract_execution"
path = "tests/execution/contract_execution.rs"

[[test]]
name = "csharp_compatibility_tests"
path = "tests/protocol/csharp_compatibility_tests.rs"

[[bench]]
name = "performance_benchmarks"
path = "benches/performance/performance_benchmarks.rs"
harness = false

[lints]
workspace = true
