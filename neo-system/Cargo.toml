[package]
name = "neo-system"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
homepage.workspace = true
repository.workspace = true
documentation.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
readme.workspace = true
description = "Neo node orchestrator (Node builder) — reth-style service composition root"

[dependencies]
# Lower layers wired by the composition root
neo-error = { workspace = true }
neo-storage = { workspace = true }
neo-payloads = { workspace = true }

# Node and domain service crates
neo-blockchain = { workspace = true }
neo-mempool = { workspace = true }
neo-state-service = { workspace = true }
neo-network = { workspace = true }
neo-wallets = { workspace = true }
neo-native-contracts = { workspace = true }
neo-config = { workspace = true }

# Runtime service traits
neo-runtime = { workspace = true }

# External
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "signal", "sync"] }
tokio-util = { workspace = true }
tracing = { workspace = true }
thiserror = { workspace = true }
parking_lot = { workspace = true }

