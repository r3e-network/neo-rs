[package]
name = "neo-benches"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
publish = false
description = "Criterion benchmarks for the neo-rs workspace"

[dependencies]
criterion = { workspace = true, features = ["html_reports"] }
