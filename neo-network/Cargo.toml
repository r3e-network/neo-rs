[package]
name = "neo-network"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
homepage.workspace = true
repository.workspace = true
documentation.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
readme.workspace = true
description = "Canonical home for Neo P2P network host: reth-style LocalNode, RemoteNode, and TaskManager services"

[dependencies]
# Lower foundation / infrastructure layers
neo-primitives = { workspace = true }
neo-config = { workspace = true }

# Protocol types and binary wire helpers
neo-io = { workspace = true }
neo-payloads = { workspace = true }

# Domain service vocabulary
neo-runtime = { workspace = true }

# Async runtime
tokio = { workspace = true, features = ["macros", "net", "rt", "rt-multi-thread", "sync", "time"] }
tokio-util = { workspace = true, features = ["codec"] }
async-trait = { workspace = true }
bytes = { workspace = true }
futures = { workspace = true }
parking_lot = { workspace = true }

# Errors / logging
serde = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }

[dev-dependencies]
serde_json = { workspace = true }

[features]
default = []
upnp = []

[lints]
workspace = true
