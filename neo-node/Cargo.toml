[package]
name = "neo-node"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
homepage.workspace = true
repository.workspace = true
documentation.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
readme.workspace = true
description = "Neo N3 blockchain node daemon"

[[bin]]
name = "neo-node"
path = "src/main.rs"

[[bin]]
name = "neo-db-probe"
path = "src/bin/neo-db-probe.rs"

[features]
default = []
# Optional HSM-backed consensus signing (PKCS#11: AWS/Azure/GCP).
hsm = ["dep:neo-hsm", "neo-hsm/pkcs11"]

[dependencies]
neo-vm-rs = { workspace = true }

# HSM-backed consensus signer (feature-gated)
neo-hsm = { workspace = true, optional = true }

# Async channels
futures = { workspace = true }
zeroize = { workspace = true }

# CLI and configuration
clap = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
toml = { workspace = true }
prometheus = { workspace = true }
parking_lot = { workspace = true }
reqwest = { workspace = true }
base64 = { workspace = true }

# Async runtime
tokio = { workspace = true, features = ["macros", "net", "rt-multi-thread", "signal", "sync", "time"] }
tokio-util = { workspace = true, features = ["rt"] }
hyper = { workspace = true }

# Logging
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
tracing-appender = { workspace = true }

# Error handling
anyhow = { workspace = true }
thiserror = { workspace = true }

# Utilities
chrono = { workspace = true }
sysinfo = { workspace = true }
rand = { workspace = true }
url = { workspace = true }
num_cpus = { workspace = true }
num-bigint = { workspace = true }
mimalloc = { version = "0.1", default-features = false }

# The node workspace crates. (neo-tokens-tracker was merged into neo-rpc; its
# tokens_tracker module is now at neo-rpc/src/plugins/tokens_tracker/.)
neo-oracle-service = { workspace = true }
neo-consensus = { workspace = true }
neo-crypto = { workspace = true }
neo-rpc = { workspace = true, features = ["server"] }
neo-indexer = { workspace = true }
neo-config = { workspace = true }
neo-execution = { workspace = true }
neo-io = { workspace = true }
neo-native-contracts = { workspace = true }
neo-network = { workspace = true }
neo-payloads = { workspace = true }
neo-primitives = { workspace = true }
neo-runtime = { workspace = true }
neo-state-service = { workspace = true }
neo-storage = { workspace = true }
neo-serialization = { workspace = true }
neo-system = { workspace = true }
neo-wallets = { workspace = true }
neo-blockchain = { workspace = true }
neo-manifest = { workspace = true }
neo-vm = { workspace = true }
hex = { workspace = true }
neo-mempool = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }

[[test]]
name = "block_assembly_test"
path = "tests/consensus/block_assembly_test.rs"

[lints]
workspace = true
