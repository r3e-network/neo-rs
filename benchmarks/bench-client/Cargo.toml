# Standalone benchmark client — its own [workspace] so the parent neo-rs
# workspace ignores it (build it from this directory).
[workspace]

[package]
name = "neo-bench-client"
version = "0.1.0"
edition = "2021"
description = "JSON-RPC load generator for cross-implementation Neo N3 node benchmarks (neo-rs vs neo-cli vs neo-go)"

[[bin]]
name = "neo-bench"
path = "src/main.rs"

[dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "macros", "time", "sync"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
clap = { version = "4", features = ["derive"] }

[profile.release]
opt-level = 3
lto = true
