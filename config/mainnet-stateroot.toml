# Neo N3 MainNet - State Root Validation Config

[network]
network_magic = 0x334F454E

[storage]
backend = "mdbx"
data_dir = "./data/mainnet-stateroot"
read_only = false
mdbx_geometry_upper_gb = 512
mdbx_geometry_growth_mb = 256
mdbx_max_readers = 4096

[p2p]
port = 10333
max_connections = 40
min_desired_connections = 10
max_connections_per_address = 3
max_known_hashes = 1000
seed_nodes = [
    "seed1.neo.org:10333",
    "seed2.neo.org:10333",
    "seed3.neo.org:10333",
    "seed4.neo.org:10333",
    "seed5.neo.org:10333"
]
enable_compression = true

[rpc]
enabled = true
port = 20332
bind_address = "127.0.0.1"
cors_enabled = false
auth_enabled = false
max_gas_invoke = 50000000

[indexer]
enabled = true
store_path = "../mainnet/indexer"

[application_logs]
enabled = true
path = "../mainnet/application-logs"
max_stack_size = 65535
debug = false
exception_policy = "Ignore"

[tokens_tracker]
enabled = true
db_path = "../mainnet/tokens"
track_history = true
max_results = 1000
enabled_trackers = ["NEP-17", "NEP-11"]
exception_policy = "StopPlugin"

[consensus]
enabled = false

[telemetry]
[telemetry.metrics]
enabled = false
port = 9090
bind_address = "127.0.0.1"
path = "/metrics"

[observability]
enabled = false
service_name = "neo-node-mainnet"
environment = "production"
capture_panics = true
request_timeout_ms = 5000
max_send_attempts = 3
retry_backoff_ms = 250
heartbeat_interval_seconds = 60
# [[observability.error_endpoints]]
# kind = "google_error_reporting"
# project_id = "your-gcp-project"
# token_env = "GOOGLE_ERROR_REPORTING_TOKEN"
# [[observability.heartbeat_endpoints]]
# name = "better-stack"
# url = "https://uptime.betterstack.com/api/v1/heartbeat/your-heartbeat-id"
# method = "GET"

[logging]
level = "info"
format = "json"
console_output = true

[blockchain]
block_time = 15000
max_transactions_per_block = 200

[mempool]
max_transactions = 50000

[state_service]
enabled = true
full_state = true
track_during_catchup = true
auto_verify = false
max_find_result_items = 100
