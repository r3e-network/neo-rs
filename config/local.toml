# Neo N3 Local Development Configuration
# Minimal configuration for local development and testing

[network]
network_magic = 0x4C4F4341  # "LOCA" in hex

[storage]
backend = "memory"
data_dir = "./data/local"
read_only = false

[p2p]
port = 30333
max_connections = 10
min_desired_connections = 1
seed_nodes = []
enable_compression = false
broadcast_history_limit = 1000

[rpc]
enabled = true
port = 30332
bind_address = "127.0.0.1"
cors_enabled = true
auth_enabled = false
max_gas_invoke = 50000000
max_iterator_results = 100
disabled_methods = []

[indexer]
enabled = true
store_path = "./data/local/indexer"

[application_logs]
enabled = true
path = "./data/local/application-logs"
max_stack_size = 65535
debug = true
exception_policy = "Ignore"

[tokens_tracker]
enabled = true
db_path = "./data/local/tokens"
track_history = true
max_results = 1000
enabled_trackers = ["NEP-17", "NEP-11"]
exception_policy = "StopPlugin"

[consensus]
enabled = false
auto_start = false

[telemetry]
[telemetry.metrics]
enabled = true
port = 9092
bind_address = "127.0.0.1"
path = "/metrics"

[observability]
enabled = false
service_name = "neo-node-local"
environment = "local"
capture_panics = true
request_timeout_ms = 5000
max_send_attempts = 3
retry_backoff_ms = 250
heartbeat_interval_seconds = 60
# [[observability.error_endpoints]]
# kind = "custom_json"
# url = "https://errors.example.com/neo-node"
# [[observability.heartbeat_endpoints]]
# name = "better-stack"
# url = "https://uptime.betterstack.com/api/v1/heartbeat/your-heartbeat-id"
# method = "GET"

[logging]
level = "debug"
format = "pretty"
console_output = true
file_path = "./logs/neo-node-local.log"
max_file_size = "10MB"
max_files = 3

[blockchain]
block_time = 1000  # 1 second for fast development
max_transactions_per_block = 100

[mempool]
max_transactions = 1000
