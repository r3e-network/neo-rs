# cargo-deny configuration for the neo-rs workspace.
#
# Run locally / in CI with:  cargo deny check
# Docs: https://embarkstudios.github.io/cargo-deny/
#
# This gate guards supply-chain hygiene the workspace previously lacked:
#   - security advisories (RUSTSEC)
#   - duplicate crate versions (e.g. the dual `sha2` 0.10/0.11 pulled in via the
#     pinned out-of-workspace neo-vm-rs Git dependency)
#   - license compliance

[advisories]
version = 2
# Fail on any crate with an open RUSTSEC advisory or a yanked release.
yanked = "deny"
# Temporary compatibility exception: consensus recovery logs use bincode 1.3.3
# bytes today. A silent codec swap could erase anti-double-signing recovery state.
# Removal is tracked by production-readiness Phase 2 plan 02-03, which must add a
# versioned, bounded recovery envelope and migrate legacy logs before this entry
# can be deleted. No other workspace or fuzz package may depend on bincode.
ignore = ["RUSTSEC-2025-0141"]

[bans]
# Surface duplicate versions of the same crate (warn first; ratchet to "deny"
# once the known duplicates — sha2, secp256k1 — are reconciled).
multiple-versions = "warn"
# Disallow `version = "*"` style wildcard dependencies.
wildcards = "deny"
# Prefer the workspace dependency table over per-crate pins (advisory).
workspace-default-features = "allow"

[licenses]
version = 2
# OSI-approved / permissive licenses present in (or acceptable for) the tree.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",
    "BSL-1.0",
    "NCSA",
]
confidence-threshold = 0.8

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = ["https://github.com/r3e-network/neo-vm-rs.git"]
