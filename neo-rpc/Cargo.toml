[package]
name = "neo-rpc"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
homepage.workspace = true
repository.workspace = true
documentation.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
readme.workspace = true
description = "RPC server and client for Neo blockchain"

# The websocket-events integration test exercises the server module, which is
# gated behind the (non-default) `server` feature.
[[test]]
name = "ws_events"
path = "tests/server/ws_events.rs"
required-features = ["server"]

[[test]]
name = "jsonrpsee_adapter"
path = "tests/server/jsonrpsee_adapter.rs"
required-features = ["server"]

[[test]]
name = "rate_limiter_governor"
path = "tests/server/rate_limiter_governor.rs"
required-features = ["server"]

[[test]]
name = "rpc_blockchain_getrawtransaction_vmstate"
path = "tests/server/rpc_blockchain_getrawtransaction_vmstate.rs"
required-features = ["server"]

[[test]]
name = "rpc_handler_registration"
path = "tests/server/rpc_handler_registration.rs"
required-features = ["server"]

[[test]]
name = "validate_address"
path = "tests/server/validate_address.rs"
required-features = ["server"]

[dependencies]
# Internal crates — always needed (error/error_code modules)
neo-primitives = { workspace = true }
neo-error = { workspace = true }

# Internal crates — needed by both client and server (serialization, models)
neo-crypto = { workspace = true, optional = true }
neo-io = { workspace = true, optional = true }
neo-manifest = { workspace = true, optional = true }
neo-native-contracts = { workspace = true, optional = true }
neo-storage = { workspace = true, optional = true }
neo-vm = { workspace = true, optional = true }
neo-wallets = { workspace = true, optional = true }
neo-serialization = { workspace = true, optional = true }

# Internal crates — client feature
neo-config = { workspace = true, optional = true }
neo-execution = { workspace = true, optional = true }
neo-payloads = { workspace = true, optional = true }
neo-vm-rs = { workspace = true, optional = true }

# Internal crates — server feature only
neo-runtime = { workspace = true, optional = true }
neo-oracle-service = { workspace = true, optional = true }
neo-indexer = { workspace = true, optional = true }
neo-network = { workspace = true, optional = true }
neo-state-service = { workspace = true, optional = true }
neo-blockchain = { workspace = true, optional = true }
neo-mempool = { workspace = true, optional = true }

# Async runtime
tokio = { workspace = true, features = ["fs", "io-util", "macros", "net", "rt", "rt-multi-thread", "sync", "time"] }
futures = { workspace = true, optional = true }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }
serde_urlencoded = { version = "0.7", optional = true }

# Error handling
thiserror = { workspace = true }

# Logging
tracing = { workspace = true }

# Web server (server feature)
# jsonrpsee is the canonical JSON-RPC transport for the server.
# The legacy HTTP routing glue has been removed; see the
# `2026-06-13-comprehensive-refactoring` change (Phase C1) for the
# migration history.
jsonrpsee = { version = "0.24.10", optional = true, default-features = false, features = ["server"] }
tower = { version = "0.4", optional = true }

# Rate limiting (server feature)
dashmap = { workspace = true, optional = true }
governor = { workspace = true, optional = true }

# HTTP client (client feature)
reqwest = { workspace = true, optional = true }

# Utilities
uuid = { workspace = true, optional = true }
parking_lot = { workspace = true, optional = true }
prometheus = { workspace = true, optional = true }
base64 = { workspace = true, optional = true }
bytes = { workspace = true, optional = true }
num-bigint = { workspace = true, optional = true }
num-traits = { workspace = true, optional = true }
hex = { workspace = true, optional = true }

# Cryptography (server feature)
rand = { workspace = true, optional = true }
zeroize = { workspace = true, optional = true }
subtle = { workspace = true, optional = true }


[dev-dependencies]
mockito = { workspace = true }
neo-system = { workspace = true }
neo-test-fixtures = { workspace = true }
regex = "1.10"

[features]
default = []
server = [
    "client",  # Server uses client models for JSON serialization
    "dep:jsonrpsee",
    "dep:tower",
    # Shared client+server deps
    "dep:neo-crypto",
    "dep:neo-io",
    "dep:neo-manifest",
    "dep:neo-native-contracts",
    "dep:neo-storage",
    "dep:neo-vm",
    "dep:neo-wallets",
    "dep:neo-serialization",
    # Client deps (inherited via client feature, but listed for clarity)
    "dep:neo-config",
    "dep:neo-execution",
    "dep:neo-payloads",
    "dep:neo-vm-rs",
    # Server-only deps
    "dep:neo-runtime",
    "dep:neo-oracle-service",
    "dep:neo-indexer",
    "dep:neo-network",
    "dep:neo-state-service",
    "dep:neo-blockchain",
    "dep:neo-mempool",
    # External server deps
    "dep:uuid",
    "dep:parking_lot",
    "dep:prometheus",
    "dep:serde_urlencoded",
    "dep:base64",
    "dep:bytes",
    "dep:num-bigint",
    "dep:num-traits",
    "dep:hex",
    "dep:rand",
    "dep:zeroize",
    "dep:subtle",
    "dep:dashmap",
    "dep:governor",
    "dep:futures",
]
client = [
    # Shared client+server deps
    "dep:neo-crypto",
    "dep:neo-io",
    "dep:neo-manifest",
    "dep:neo-native-contracts",
    "dep:neo-storage",
    "dep:neo-vm",
    "dep:neo-wallets",
    "dep:neo-serialization",
    # Client deps
    "dep:neo-config",
    "dep:neo-vm-rs",
    "dep:neo-payloads",
    "dep:neo-execution",
    # External client deps
    "dep:reqwest",
    "dep:base64",
    "dep:hex",
    "dep:num-bigint",
    "dep:num-traits",
    "dep:rand",
    "dep:zeroize",
]

[lints]
workspace = true
