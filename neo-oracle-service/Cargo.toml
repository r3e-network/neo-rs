[package]
name = "neo-oracle-service"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
homepage.workspace = true
repository.workspace = true
documentation.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
readme.workspace = true
description = "Oracle plugin for the Neo blockchain (HTTPS + NeoFS oracle request fulfilment)"

[dependencies]
neo-vm = { workspace = true }
neo-storage = { workspace = true }
neo-crypto = { workspace = true }
base64 = { workspace = true }
hex = { workspace = true }
rand = { workspace = true }
percent-encoding = { workspace = true }
url = { workspace = true }
futures = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
parking_lot = { workspace = true }
tracing = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["macros", "net", "rt", "rt-multi-thread", "sync", "time"] }
# HTTPS oracle fetching (behind the `oracle` feature, matching neo-core's prior gating).
reqwest = { workspace = true, optional = true }
# NeoFS gRPC transport (behind `neofs-grpc`).
tonic = { workspace = true, optional = true }
prost = { workspace = true, optional = true }

neo-config = { workspace = true }
neo-error = { workspace = true }
neo-execution = { workspace = true }
neo-io = { workspace = true }
neo-serialization = { workspace = true }
neo-native-contracts = { workspace = true }
neo-payloads = { workspace = true }
neo-primitives = { workspace = true }
neo-runtime = { workspace = true }
neo-wallets = { workspace = true }

neo-manifest = { workspace = true }

[build-dependencies]
# Only used when the neofs-grpc feature is enabled (build.rs checks
# CARGO_FEATURE_NEOFS_GRPC); Cargo cannot feature-gate build-deps.
tonic-build = { workspace = true }
protoc-bin-vendored = { workspace = true }

[dev-dependencies]
bs58 = { workspace = true }
# Tests construct `Node::new(...)` directly; production code uses
# the `ConfigProvider` + `StoreProvider` traits from `neo-runtime`.
neo-system = { workspace = true }

[features]
default = []
# Oracle HTTPS fetching - requires reqwest.
oracle = ["dep:reqwest"]
# NeoFS gRPC oracle protocol - requires tonic/prost and pulls in oracle.
neofs-grpc = ["dep:tonic", "dep:prost", "oracle"]

[lints]
workspace = true
