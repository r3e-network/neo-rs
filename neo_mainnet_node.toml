# Neo N3 MainNet Node Configuration
# Professional production-ready configuration

[network]
network_type = "MainNet"
network_magic = 0x334F454E  # MainNet magic number

[storage]
backend = "mdbx"
data_dir = "./data/mainnet"
read_only = false
mdbx_geometry_upper_gb = 512
mdbx_geometry_growth_mb = 256
mdbx_max_readers = 4096

[p2p]
port = 10333
max_connections = 40
min_desired_connections = 10
max_connections_per_address = 3
max_known_hashes = 1000
seed_nodes = [
    "seed1.neo.org:10333",
    "seed2.neo.org:10333",
    "seed3.neo.org:10333",
    "seed4.neo.org:10333",
    "seed5.neo.org:10333"
]
enable_compression = true
broadcast_history_limit = 100000

[rpc]
enabled = true
port = 10332
bind_address = "127.0.0.1"
cors_enabled = false
auth_enabled = true
rpc_user = "neo"
rpc_pass = "change-me-mainnet-rpc-password"
max_gas_invoke = 50000000
max_iterator_results = 100
disabled_methods = ["openwallet"]

[indexer]
enabled = true
store_path = "./data/mainnet/indexer"

[application_logs]
enabled = true
path = "./data/mainnet/application-logs"
max_stack_size = 65535
debug = false
exception_policy = "Ignore"

[tokens_tracker]
enabled = true
db_path = "./data/mainnet/tokens"
track_history = true
max_results = 1000
enabled_trackers = ["NEP-17", "NEP-11"]
exception_policy = "StopPlugin"

[consensus]
enabled = false
auto_start = false

[telemetry]
[telemetry.metrics]
enabled = false
port = 9090
bind_address = "127.0.0.1"
path = "/metrics"

[observability]
enabled = false
service_name = "neo-node-mainnet"
environment = "production"
capture_panics = true
request_timeout_ms = 5000
heartbeat_interval_seconds = 60
# [[observability.error_endpoints]]
# kind = "google_error_reporting"
# project_id = "your-gcp-project"
# token_env = "GOOGLE_ERROR_REPORTING_TOKEN"
# [[observability.error_endpoints]]
# kind = "sentry"
# url = "https://sentry.example.com/api/your-project-id/store/"
# [observability.error_endpoints.headers_env]
# X-Sentry-Auth = "SENTRY_AUTH_HEADER"
# [[observability.heartbeat_endpoints]]
# name = "better-stack"
# url = "https://uptime.betterstack.com/api/v1/heartbeat/your-heartbeat-id"
# method = "GET"

[logging]
level = "info"
format = "json"
console_output = true
file_path = "./logs/neo-node-mainnet.log"
max_file_size = "100MB"
max_files = 10

[blockchain]
block_time = 15000  # 15 seconds in milliseconds
max_transactions_per_block = 200

[state_service]
enabled = false # opt in with --enable-stateroot or --stateroot true
full_state = true
track_during_catchup = true

[mempool]
max_transactions = 50000
