name: CI
'on':
  push:
    branches:
    - main
    - master
  pull_request:
    branches:
    - main
    - master
permissions:
  contents: read
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
env:
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always
jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
    - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
      with:
        toolchain: 1.89.0
        components: rustfmt
    # Check only this workspace's members. The locked `cargo metadata --no-deps`
    # query excludes the separately released `neo-vm-rs` Git dependency and its
    # independent rustfmt style.
    - name: Format check (workspace members)
      run: |
        for pkg in $(cargo metadata --locked --no-deps --format-version 1 | jq -r '.packages[].name'); do
          cargo fmt --check --package "$pkg"
        done
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
    - name: Reclaim runner disk space
      run: 'sudo rm -rf /usr/local/lib/android /opt/ghc /usr/share/dotnet

        sudo docker image prune -af || true

        '
    - name: Cache APT packages
      uses: awalsh128/cache-apt-pkgs-action@553a35bb8ebd9fcabcb1c9451aa4c98e1b4ca8a9 # latest
      with:
        packages: build-essential clang cmake libbz2-dev libclang-dev liblz4-dev
          libsnappy-dev libssl-dev libzstd-dev pkg-config zlib1g-dev
        version: 1.0
    - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
      with:
        toolchain: 1.89.0
        components: clippy
    - name: Setup sccache
      uses: mozilla-actions/sccache-action@054db53350805f83040bf3e6e9b8cf5a139aa7c9 # v0.0.7
      continue-on-error: true
    - name: Enable sccache (best-effort)
      run: "if sccache --start-server 2>/dev/null && sccache --show-stats 2>/dev/null;\
        \ then\n  echo \"RUSTC_WRAPPER=sccache\" >> \"$GITHUB_ENV\"\n  echo \"SCCACHE_GHA_ENABLED=true\"\
        \ >> \"$GITHUB_ENV\"\n  echo \"::notice::sccache enabled\"\nelse\n  echo \"\
        ::warning::sccache unavailable — falling back to direct compilation\"\nfi\n"
    - name: Cache cargo registry & git
      uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      with:
        shared-key: ci-lint
    - name: Clippy
      # The lint policy (deny clippy::all + the accepted allow-list) lives in
      # [workspace.lints.clippy] in the root Cargo.toml, so local `cargo clippy`
      # and CI enforce exactly the same rules.
      run: cargo clippy --workspace --all-targets --profile test --locked -- -D warnings
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
    - name: Reclaim runner disk space
      run: 'sudo rm -rf /usr/local/lib/android /opt/ghc /usr/share/dotnet

        sudo docker image prune -af || true

        '
    - name: Cache APT packages
      uses: awalsh128/cache-apt-pkgs-action@553a35bb8ebd9fcabcb1c9451aa4c98e1b4ca8a9 # latest
      with:
        packages: build-essential clang cmake libbz2-dev libclang-dev liblz4-dev
          libsnappy-dev libssl-dev libzstd-dev pkg-config zlib1g-dev
        version: 1.0
    - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
      with:
        toolchain: 1.89.0
    - name: Setup sccache
      uses: mozilla-actions/sccache-action@054db53350805f83040bf3e6e9b8cf5a139aa7c9 # v0.0.7
      continue-on-error: true
    - name: Enable sccache (best-effort)
      run: "if sccache --start-server 2>/dev/null && sccache --show-stats 2>/dev/null;\
        \ then\n  echo \"RUSTC_WRAPPER=sccache\" >> \"$GITHUB_ENV\"\n  echo \"SCCACHE_GHA_ENABLED=true\"\
        \ >> \"$GITHUB_ENV\"\n  echo \"::notice::sccache enabled\"\nelse\n  echo \"\
        ::warning::sccache unavailable — falling back to direct compilation\"\nfi\n"
    - name: Install cargo-nextest
      uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2
      with:
        tool: cargo-nextest@0.9.128
    - name: Cache cargo registry & git
      uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      with:
        shared-key: ci-test
    - name: Build tests
      run: cargo test --workspace --no-run --locked
    - name: Run tests
      run: cargo nextest run --workspace --no-fail-fast --locked
    - name: Run doctests
      run: cargo test --workspace --doc --locked
  dependency-policy:
    name: Dependency Policy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
    - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
      with:
        toolchain: 1.89.0
    - name: Install cargo-deny
      uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2
      with:
        tool: cargo-deny@0.18.9
    - name: Validate locked dependency graphs
      run: |
        cargo metadata --locked --no-deps --format-version 1 >/dev/null
        cargo metadata --manifest-path fuzz/Cargo.toml --locked --no-deps --format-version 1 >/dev/null
    - name: Check root dependency policy
      run: cargo deny --locked check advisories bans licenses sources --hide-inclusion-graph
    - name: Check fuzz dependency policy
      run: cargo deny --manifest-path fuzz/Cargo.toml --locked check advisories bans licenses sources --hide-inclusion-graph
  repository-policy:
    name: Repository Policy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
    - name: Run repository policy guards
      run: python3 -m unittest discover -s scripts/tests -p 'test_*.py'
