name: Release
true:
  push:
    tags:
    - v*
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Override Docker image tag (default: ref name or latest)'
        required: false
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/neo-rs
jobs:
  docker-release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Log in to registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Prepare tags
      id: prep
      run: "TAG_INPUT=\"${{ github.event.inputs.image_tag }}\"\nif [ -n \"$TAG_INPUT\"\
        \ ]; then\n  echo \"tags=${REGISTRY}/${IMAGE_NAME}:${TAG_INPUT}\" >> \"$GITHUB_OUTPUT\"\
        \nelif [[ \"${GITHUB_REF}\" == refs/tags/* ]]; then\n  REF_NAME=\"${GITHUB_REF##*/}\"\
        \n  echo \"tags=${REGISTRY}/${IMAGE_NAME}:${REF_NAME},${REGISTRY}/${IMAGE_NAME}:latest\"\
        \ >> \"$GITHUB_OUTPUT\"\nelse\n  echo \"tags=${REGISTRY}/${IMAGE_NAME}:latest\"\
        \ >> \"$GITHUB_OUTPUT\"\nfi\n"
    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.prep.outputs.tags }}
        platforms: linux/amd64
    timeout-minutes: 15
