name: Fuzzing
'on':
  push:
    branches:
    - main
    - master
    paths:
    - Cargo.lock
    - Cargo.toml
    - neo-config/**
    - neo-crypto/**
    - neo-error/**
    - neo-io/**
    - neo-manifest/**
    - neo-network/**
    - neo-payloads/**
    - neo-primitives/**
    - neo-runtime/**
    - neo-serialization/**
    - neo-storage/**
    - neo-vm/**
    - fuzz/**
    - .github/workflows/fuzz.yml
  pull_request:
    branches:
    - main
    - master
    paths:
    - Cargo.lock
    - Cargo.toml
    - neo-config/**
    - neo-crypto/**
    - neo-error/**
    - neo-io/**
    - neo-manifest/**
    - neo-network/**
    - neo-payloads/**
    - neo-primitives/**
    - neo-runtime/**
    - neo-serialization/**
    - neo-storage/**
    - neo-vm/**
    - fuzz/**
    - .github/workflows/fuzz.yml
  schedule:
  - cron: 0 2 * * *
  workflow_dispatch:
    inputs:
      duration:
        description: Fuzzing duration in seconds per target
        required: false
        default: '300'
        type: string
permissions:
  contents: read
env:
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: 1
jobs:
  fuzz-transaction:
    name: Fuzz Transaction Parsing
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - name: Checkout
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
    - name: Install dependencies
      run: "sudo apt-get update\nsudo apt-get install -y --no-install-recommends \\\
        \n  build-essential \\\n  clang \\\n  libclang-dev \\\n  llvm-dev \\\n  liblz4-dev\
        \ \\\n  libssl-dev \\\n  pkg-config\n"
    - name: Install Rust nightly
      uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
      with:
        toolchain: nightly-2025-11-30
    - name: Install cargo-fuzz
      run: cargo install cargo-fuzz --version 0.13.1 --locked
    - name: Cache cargo
      uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      with:
        key: fuzz-transaction
    - name: Run fuzz_transaction_parse
      run: |
        cd fuzz
        cargo metadata --locked --no-deps --format-version 1 >/dev/null
        lock_before="$(sha256sum Cargo.lock | awk '{print $1}')"
        rc=0
        cargo fuzz run fuzz_transaction_parse \
          --release \
          -- -max_total_time=${{ github.event.inputs.duration || 300 }} -print_final_stats=1 || rc=$?
        lock_after="$(sha256sum Cargo.lock | awk '{print $1}')"
        if [ "$lock_before" != "$lock_after" ]; then
          echo "fuzz/Cargo.lock changed during fuzz_transaction_parse" >&2
          exit 1
        fi
        exit "$rc"
    - name: Upload crash artifacts
      if: failure()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: transaction-crashes
        path: fuzz/artifacts/fuzz_transaction_parse/
        retention-days: 7
  fuzz-script:
    name: Fuzz Script Parsing
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - name: Checkout
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
    - name: Install dependencies
      run: "sudo apt-get update\nsudo apt-get install -y --no-install-recommends \\\
        \n  build-essential \\\n  clang \\\n  libclang-dev \\\n  llvm-dev \\\n  liblz4-dev\
        \ \\\n  libssl-dev \\\n  pkg-config\n"
    - name: Install Rust nightly
      uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
      with:
        toolchain: nightly-2025-11-30
    - name: Install cargo-fuzz
      run: cargo install cargo-fuzz --version 0.13.1 --locked
    - name: Cache cargo
      uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      with:
        key: fuzz-script
    - name: Run fuzz_script_parse
      run: |
        cd fuzz
        cargo metadata --locked --no-deps --format-version 1 >/dev/null
        lock_before="$(sha256sum Cargo.lock | awk '{print $1}')"
        rc=0
        cargo fuzz run fuzz_script_parse \
          --release \
          -- -max_total_time=${{ github.event.inputs.duration || 300 }} -print_final_stats=1 || rc=$?
        lock_after="$(sha256sum Cargo.lock | awk '{print $1}')"
        if [ "$lock_before" != "$lock_after" ]; then
          echo "fuzz/Cargo.lock changed during fuzz_script_parse" >&2
          exit 1
        fi
        exit "$rc"
    - name: Upload crash artifacts
      if: failure()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: script-crashes
        path: fuzz/artifacts/fuzz_script_parse/
        retention-days: 7
  fuzz-message:
    name: Fuzz Message Parsing
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - name: Checkout
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
    - name: Install dependencies
      run: "sudo apt-get update\nsudo apt-get install -y --no-install-recommends \\\
        \n  build-essential \\\n  clang \\\n  libclang-dev \\\n  llvm-dev \\\n  liblz4-dev\
        \ \\\n  libssl-dev \\\n  pkg-config\n"
    - name: Install Rust nightly
      uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
      with:
        toolchain: nightly-2025-11-30
    - name: Install cargo-fuzz
      run: cargo install cargo-fuzz --version 0.13.1 --locked
    - name: Cache cargo
      uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      with:
        key: fuzz-message
    - name: Run fuzz_message_parse
      run: |
        cd fuzz
        cargo metadata --locked --no-deps --format-version 1 >/dev/null
        lock_before="$(sha256sum Cargo.lock | awk '{print $1}')"
        rc=0
        cargo fuzz run fuzz_message_parse \
          --release \
          -- -max_total_time=${{ github.event.inputs.duration || 300 }} -print_final_stats=1 || rc=$?
        lock_after="$(sha256sum Cargo.lock | awk '{print $1}')"
        if [ "$lock_before" != "$lock_after" ]; then
          echo "fuzz/Cargo.lock changed during fuzz_message_parse" >&2
          exit 1
        fi
        exit "$rc"
    - name: Upload crash artifacts
      if: failure()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: message-crashes
        path: fuzz/artifacts/fuzz_message_parse/
        retention-days: 7
  fuzz-smoke-test:
    name: Fuzz Smoke Test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 30
    steps:
    - name: Checkout
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
    - name: Install dependencies
      run: "sudo apt-get update\nsudo apt-get install -y --no-install-recommends \\\
        \n  build-essential \\\n  clang \\\n  libclang-dev \\\n  llvm-dev \\\n  liblz4-dev\
        \ \\\n  libssl-dev \\\n  pkg-config\n"
    - name: Install Rust nightly
      uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
      with:
        toolchain: nightly-2025-11-30
    - name: Install cargo-fuzz
      run: cargo install cargo-fuzz --version 0.13.1 --locked
    - name: Cache cargo
      uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      with:
        key: fuzz-smoke
    - name: Run smoke tests (30 seconds each)
      run: |
        cd fuzz
        cargo metadata --locked --no-deps --format-version 1 >/dev/null
        lock_before="$(sha256sum Cargo.lock | awk '{print $1}')"
        rc=0
        echo "=== Transaction Fuzzing ==="
        cargo fuzz run fuzz_transaction_parse --release -- -max_total_time=30 || rc=$?
        if [ "$rc" -eq 0 ]; then
          echo "=== Script Fuzzing ==="
          cargo fuzz run fuzz_script_parse --release -- -max_total_time=30 || rc=$?
        fi
        if [ "$rc" -eq 0 ]; then
          echo "=== Message Fuzzing ==="
          cargo fuzz run fuzz_message_parse --release -- -max_total_time=30 || rc=$?
        fi
        lock_after="$(sha256sum Cargo.lock | awk '{print $1}')"
        if [ "$lock_before" != "$lock_after" ]; then
          echo "fuzz/Cargo.lock changed during smoke fuzzing" >&2
          exit 1
        fi
        exit "$rc"
