name: Neo v3.10.1 Consistency
on:
  push:
    branches:
    - main
    - master
    paths:
    - .github/workflows/compatibility-v310.yml
    - scripts/validate-v310-consistency.sh
    - Cargo.lock
    - Cargo.toml
    - neo-blockchain/**
    - neo-checkpoint/**
    - neo-config/**
    - neo-consensus/**
    - neo-crypto/**
    - neo-error/**
    - neo-execution/**
    - neo-indexer/**
    - neo-io/**
    - neo-manifest/**
    - neo-mempool/**
    - neo-native-contracts/**
    - neo-network/**
    - neo-node/**
    - neo-oracle-service/**
    - neo-payloads/**
    - neo-primitives/**
    - neo-rpc/**
    - neo-runtime/**
    - neo-serialization/**
    - neo-state-service/**
    - neo-static-files/**
    - neo-storage/**
    - neo-system/**
    - neo-vm/**
    - neo-wallets/**
  pull_request:
    branches:
    - main
    - master
    paths:
    - .github/workflows/compatibility-v310.yml
    - scripts/validate-v310-consistency.sh
    - Cargo.lock
    - Cargo.toml
    - neo-blockchain/**
    - neo-checkpoint/**
    - neo-config/**
    - neo-consensus/**
    - neo-crypto/**
    - neo-error/**
    - neo-execution/**
    - neo-indexer/**
    - neo-io/**
    - neo-manifest/**
    - neo-mempool/**
    - neo-native-contracts/**
    - neo-network/**
    - neo-node/**
    - neo-oracle-service/**
    - neo-payloads/**
    - neo-primitives/**
    - neo-rpc/**
    - neo-runtime/**
    - neo-serialization/**
    - neo-state-service/**
    - neo-static-files/**
    - neo-storage/**
    - neo-system/**
    - neo-vm/**
    - neo-wallets/**
  schedule:
  - cron: 0 */12 * * *
  workflow_dispatch:
    inputs:
      network:
        description: Network to validate
        required: false
        type: choice
        options:
        - all
        - mainnet
        - testnet
        default: all
      skip_baseline:
        description: Skip C# vs NeoGo baseline check
        required: false
        type: boolean
        default: false
      profile:
        description: Cargo profile
        required: false
        type: choice
        options:
        - dev
        - release
        default: dev
permissions:
  contents: read
jobs:
  consistency:
    name: ${{ matrix.network }} consistency
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        network:
        - mainnet
        - testnet
    steps:
    - name: Checkout
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
    - name: Install system dependencies
      run: "sudo apt-get update\nsudo apt-get install -y --no-install-recommends \\\
        \n  build-essential \\\n  clang \\\n  cmake \\\n  curl \\\n  jq \\\n  libbz2-dev\
        \ \\\n  libclang-dev \\\n  liblz4-dev \\\n  libsnappy-dev\
        \ \\\n  libssl-dev \\\n  libzstd-dev \\\n  pkg-config \\\n  python3 \\\n \
        \ python3-pip \\\n  python3-venv \\\n  zlib1g-dev\n"
    - name: Set up Rust
      uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
      with:
        toolchain: 1.89.0
    - name: Cache cargo
      uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
    - name: Run Neo v3.10.1 consistency validation
      env:
        TARGET_NETWORK: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.network
          || 'all' }}
        PROFILE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.profile
          || 'dev' }}
        SKIP_BASELINE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.skip_baseline
          || 'false' }}
        VECTOR_GAS_TOLERANCE: 1000000
      # The validation can fail transiently when ALL live C#/NeoGo reference seeds
      # are unreachable from the runner (observed flaky: mainnet lane alternates
      # X/✓ across runs purely on seed reachability). Retry up to 3x so a
      # network-outage red self-heals on the next attempt. The build is cached,
      # so retries only re-run the validator script (fast). A real parity failure
      # (vector mismatch the reconciler cannot accept) fails every attempt.
      run: |
        if [ "$TARGET_NETWORK" != "all" ] && [ "$TARGET_NETWORK" != "${{ matrix.network }}" ]; then
          echo "Skipping matrix lane '${{ matrix.network }}' for requested network '$TARGET_NETWORK'"
          exit 0
        fi
        args=(--network "${{ matrix.network }}" --profile "$PROFILE")
        if [ "$SKIP_BASELINE" = "true" ]; then
          args+=(--skip-baseline)
        fi
        rc=1
        for attempt in 1 2 3; do
          echo "=== consistency attempt $attempt/3 ==="
          if bash scripts/validate-v310-consistency.sh "${args[@]}"; then
            rc=0
            break
          else
            rc=$?
            echo "attempt $attempt failed (rc=$rc)" >&2
          fi
          [ "$attempt" -lt 3 ] && sleep 15
        done
        exit "$rc"
    - name: Upload consistency artifacts
      if: always()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: v310-consistency-${{ matrix.network }}
        path: 'reports/compat-v310/**

          '
        retention-days: 14
